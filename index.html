<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>法侍酒業POS系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== 登入畫面 ========== -->
  <div id="login-view" hidden>
    <div class="login-card">
      <h1 class="brand">法侍酒業POS系統</h1>
      <p class="brand-sub">葡萄酒進銷存系統</p>
      <label>Email
        <input type="email" id="login-email" autocomplete="username">
      </label>
      <label>密碼
        <input type="password" id="login-password" autocomplete="current-password">
      </label>
      <button id="login-form-btn" class="btn-primary">登入</button>
      <p id="login-msg" class="error-msg"></p>
    </div>
  </div>

  <!-- ========== 主應用 ========== -->
  <div id="app-view" hidden>
    <header>
      <span class="brand-small">法侍酒業POS系統</span>
      <nav>
        <button class="tab" data-tab="pos">開單</button>
        <button class="tab" data-tab="stock">庫存</button>
        <button class="tab" data-tab="customers">客戶</button>
        <button class="tab" data-tab="orders">訂單<span id="payment-badge" class="tab-badge" hidden></span></button>
        <button class="tab" data-tab="log">紀錄</button>
      </nav>
      <div class="user-area">
        <span id="user-name"></span>
        <button id="logout-btn" class="btn-ghost">登出</button>
      </div>
    </header>
    <div id="notif-bar" hidden></div>

    <!-- 開單頁 -->
    <main id="page-pos" class="page">
      <section class="pos-left">
        <input type="search" id="pos-search" placeholder="搜尋酒款…">
        <div id="pos-products" class="product-grid"></div>
      </section>
      <aside class="pos-cart">
        <h2>本筆訂單</h2>
        <div class="customer-box">
          <input type="search" id="customer-search" placeholder="客戶（可空 = 散客）">
          <div id="customer-results"></div>
        </div>
        <div id="cart-items"></div>
        <div class="cart-footer">
          <div class="cart-line"><span>小計</span><span>$<span id="cart-subtotal">0</span></span></div>
          <div class="cart-line">
            <span>折讓</span>
            <input type="number" id="order-discount" placeholder="0" min="0">
          </div>
          <div class="cart-line total"><span>總計</span><span>$<span id="cart-total">0</span></span></div>
          <select id="payment-method">
            <option value="cash">現金</option>
            <option value="card">刷卡</option>
            <option value="transfer">轉帳</option>
            <option value="monthly">月結</option>
            <option value="other">其他</option>
          </select>
          <button id="checkout-btn" class="btn-primary" disabled>結帳</button>
        </div>
      </aside>
    </main>

    <!-- 庫存頁 -->
    <main id="page-stock" class="page" hidden>
      <div class="page-toolbar">
        <input type="search" id="stock-search" placeholder="搜尋酒款…">
        <button id="add-product-btn" class="btn-primary">新增酒款</button>
      </div>
      <table id="stock-table" class="data-table"></table>
    </main>

    <!-- 客戶頁 -->
    <main id="page-customers" class="page" hidden>
      <div class="page-toolbar">
        <input type="search" id="cust-search" placeholder="搜尋姓名或電話…">
        <button id="add-customer-btn" class="btn-primary">新增客戶</button>
      </div>
      <table id="cust-table" class="data-table"></table>
    </main>

    <!-- 訂單頁 -->
    <main id="page-orders" class="page" hidden>
      <div class="page-toolbar orders-toolbar">
        <input type="search" id="order-search" placeholder="搜尋單號…">
        <select id="order-status-filter">
          <option value="">全部狀態</option>
          <option value="completed">已完成</option>
          <option value="void">已作廢</option>
        </select>
        <input type="date" id="order-date-from">
        <span class="toolbar-sep">—</span>
        <input type="date" id="order-date-to">
      </div>
      <table id="orders-table" class="data-table"></table>
      <div id="orders-pagination" class="pagination"></div>
    </main>

    <!-- 操作紀錄頁 -->
    <main id="page-log" class="page" hidden>
      <table id="log-table" class="data-table"></table>
    </main>
  </div>

  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
